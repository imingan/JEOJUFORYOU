<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 저주인형 전당</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   여기에 키 입력하세요 (JS 상단에도 있음)
══════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070f;--bg2:#0d0d1e;--bg3:#111128;--bg4:#16162e;
  --red:#c41825;--red-h:#e02030;--rg:rgba(196,24,37,.22);
  --gold:#c49a20;--gold-l:#e8b840;--gold-d:#8a6a10;
  --silver:#c0c0c0;--bronze:#cd7f32;
  --text:#ddd5c0;--text2:#9090a8;--text3:#55556a;
  --border:#1c1c35;--border2:#262645;--border3:#323260;
  --green:#3dd080;--purple:#a070e0;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column}

/* ══ HOF ══ */
#hof{
  background:linear-gradient(135deg,#0c0a1e,#14102a,#0c0a1e);
  border-bottom:1px solid var(--border2);
  padding:.5rem 1.2rem;flex-shrink:0;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
#hof-title{
  font-family:'Black Han Sans',sans-serif;font-size:.82rem;
  color:var(--gold-l);white-space:nowrap;display:flex;align-items:center;gap:.35rem;
}
.hof-ranks{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;flex:1}
.hr{
  display:flex;align-items:center;gap:.38rem;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:.22rem .62rem;
  animation:rkin .4s ease-out both;transition:transform .18s;
}
.hr:hover{transform:translateY(-1px)}
@keyframes rkin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.hr.r1{border-color:var(--gold-d);background:rgba(196,154,32,.08)}
.hr.r1 .rn{color:var(--gold-l)}
.hr.r2{border-color:rgba(144,144,144,.35)}
.hr.r2 .rn{color:var(--silver)}
.hr.r3{border-color:rgba(138,80,32,.4)}
.hr.r3 .rn{color:var(--bronze)}
.rm{font-size:.9rem;flex-shrink:0}
.rinfo{display:flex;flex-direction:column}
.rn{font-family:'Black Han Sans',sans-serif;font-size:.76rem;line-height:1.2}
.rc{font-size:.57rem;color:var(--text3)}
.hof-r{margin-left:auto;display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pd 2s ease infinite;flex-shrink:0}
@keyframes pd{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(61,208,128,.5)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(61,208,128,0)}}
.sp{font-size:.66rem;color:var(--text2);display:flex;align-items:center;gap:.22rem}
.sp b{color:var(--gold-l);font-weight:700}
.hof-empty{font-size:.7rem;color:var(--text3);font-style:italic}

/* ══ HEADER ══ */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.45rem 1.1rem;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#hdr h1{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;letter-spacing:.05em}
.h-sub{font-size:.55rem;color:var(--text3);letter-spacing:.1em;border-left:1px solid var(--border2);padding-left:.45rem}
.h-right{font-size:.67rem;color:var(--text3)}

/* ══ BODY ══ */
#body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ══ LEFT: ADD DOLL ══ */
#left{
  width:270px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:1.1rem .95rem;gap:.85rem;
  overflow-y:auto;
}
#left h2{
  font-family:'Black Han Sans',sans-serif;font-size:.9rem;
  color:var(--text);letter-spacing:.04em;
  display:flex;align-items:center;gap:.4rem;
}
.form-group{display:flex;flex-direction:column;gap:.2rem}
.form-group label{font-size:.6rem;color:var(--text3);letter-spacing:.06em}
.form-group input,.form-group textarea{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;padding:.46rem .68rem;outline:none;
  transition:border-color .2s;resize:none;width:100%;
}
.form-group input:focus,.form-group textarea:focus{border-color:var(--red)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text3);opacity:.55;font-size:.72rem}
.form-group textarea{min-height:65px;line-height:1.6}

#add-btn{
  width:100%;padding:.68rem;background:var(--red);color:#fff;
  border:none;border-radius:7px;font-family:'Black Han Sans',sans-serif;
  font-size:.88rem;letter-spacing:.08em;cursor:pointer;
  transition:background .15s,box-shadow .15s;
  box-shadow:0 3px 14px var(--rg);
}
#add-btn:hover{background:var(--red-h);box-shadow:0 5px 18px rgba(224,32,48,.35)}
#add-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

.form-hint{font-size:.64rem;color:var(--text3);line-height:1.65;text-align:center}

.divider{height:1px;background:var(--border);margin:.2rem 0}

/* my dolls preview in left panel */
#my-dolls-preview h3{font-size:.68rem;color:var(--text3);letter-spacing:.06em;margin-bottom:.5rem}
.my-doll-chip{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;padding:.38rem .62rem;margin-bottom:.38rem;
  font-size:.76rem;
}
.mdc-nick{color:var(--gold-l);font-family:'Black Han Sans',sans-serif;font-size:.8rem}
.mdc-cnt{font-size:.62rem;color:var(--text3)}

/* ══ RIGHT: FEED ══ */
#right{flex:1;display:flex;flex-direction:column;overflow:hidden}
#feed-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem .95rem;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.ft{display:flex;align-items:center;gap:.42rem;font-size:.78rem;font-weight:500}
.fcnt{font-size:.63rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.1rem .5rem}
.fa{display:flex;gap:.38rem}
.fb{font-size:.63rem;color:var(--text3);background:transparent;border:1px solid var(--border);border-radius:5px;padding:.18rem .55rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.fb:hover{border-color:var(--border3);color:var(--text2)}
.fb.act{border-color:var(--gold-d);color:var(--gold)}

#feed{flex:1;overflow-y:auto;padding:.75rem .9rem;display:flex;flex-direction:column;gap:.85rem}
#feed::-webkit-scrollbar{width:3px}
#feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── CREATOR BLOCK ── */
.creator-block{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  animation:cin .35s ease-out both;
}
@keyframes cin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cb-header{
  display:flex;align-items:center;gap:.55rem;
  padding:.6rem .85rem;
  background:var(--bg3);border-bottom:1px solid var(--border);
}
.cb-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Black Han Sans',sans-serif;font-size:.75rem;
  flex-shrink:0;
}
.cb-name{font-family:'Black Han Sans',sans-serif;font-size:.88rem;color:var(--text)}
.cb-sub{font-size:.62rem;color:var(--text3)}
.cb-dolls{padding:.55rem .7rem;display:flex;flex-direction:column;gap:.45rem}

/* ── DOLL CARD ── */
.dc{
  display:flex;align-items:flex-start;gap:.7rem;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:.55rem .7rem;
  transition:border-color .2s;
}
.dc:hover{border-color:var(--border3)}
.dc-doll{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:2px}
.dc-doll svg{filter:drop-shadow(0 3px 8px rgba(0,0,0,.8))}
.dc-hit-bar{
  width:100%;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;
}
.dc-hit-fill{height:100%;background:var(--red);border-radius:2px;transition:width .6s ease}
.dc-body{flex:1;min-width:0}
.dc-top{display:flex;align-items:center;gap:.38rem;margin-bottom:.3rem;flex-wrap:wrap}
.dc-nick{font-family:'Black Han Sans',sans-serif;font-size:.9rem;color:var(--gold-l)}
.dc-sf{font-size:.65rem;color:var(--text3)}
.dc-cnt{font-size:.62rem;color:var(--red);background:rgba(196,24,37,.1);border:1px solid rgba(196,24,37,.22);border-radius:12px;padding:.08rem .45rem;margin-left:auto;flex-shrink:0}
.dc-reason{font-size:.73rem;color:var(--text2);line-height:1.5;padding:.28rem .48rem;border-left:2px solid var(--border2);margin-bottom:.42rem;word-break:break-all;white-space:pre-wrap}

/* throws list */
.dc-throws{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.42rem}
.throw-item{
  display:flex;align-items:flex-start;gap:.32rem;
  font-size:.7rem;color:var(--text2);
  padding:.22rem .42rem;
  background:rgba(255,255,255,.02);border-radius:5px;
}
.throw-icon{flex-shrink:0;font-size:.8rem}
.throw-fortune{line-height:1.5;color:var(--text);font-size:.7rem}
.throw-time{font-size:.58rem;color:var(--text3);margin-left:auto;white-space:nowrap;flex-shrink:0}
.throw-more{font-size:.63rem;color:var(--text3);cursor:pointer;margin-bottom:.35rem;transition:color .18s}
.throw-more:hover{color:var(--text2)}

.dc-throw-btn{
  display:flex;align-items:center;gap:.35rem;
  background:transparent;border:1px solid var(--red);
  color:var(--red);border-radius:20px;
  padding:.28rem .75rem;font-size:.72rem;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:background .18s,color .18s;
  width:fit-content;
}
.dc-throw-btn:hover{background:var(--red);color:#fff}
.dc-throw-btn:disabled{opacity:.4;cursor:not-allowed}

/* ══ THROW MODAL ══ */
#throw-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;z-index:500;
}
#throw-modal.show{display:flex}
#tm-box{
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  width:340px;max-width:94vw;overflow:hidden;
  box-shadow:0 0 50px var(--rg),0 25px 60px rgba(0,0,0,.95);
}
#tm-arena{
  position:relative;height:220px;
  background:radial-gradient(ellipse 80% 80% at 50% 55%,#0f0f26,#07070f);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.tm-ring{position:absolute;border-radius:50%;border:1px solid rgba(30,30,70,.38);pointer-events:none}
#tm-target{display:flex;flex-direction:column;align-items:center;z-index:10;position:relative}
#tm-nick-tag{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:.16rem .65rem;margin-bottom:.38rem;font-size:.68rem;display:flex;align-items:center;gap:.25rem}
.tmnt{color:var(--gold-l);font-family:'Black Han Sans',sans-serif;font-size:.76rem}
.tmsf{color:var(--text3);font-size:.62rem}
.tmdp{transition:transform .62s cubic-bezier(.2,.8,.2,1),opacity .62s ease-out}
#tm-stand{display:flex;flex-direction:column;align-items:center;margin-top:-1px}
.tms-pole{width:5px;height:16px;background:linear-gradient(90deg,#2a1608,#5a3018,#2a1608);border-radius:2px}
.tms-base{width:58px;height:8px;background:linear-gradient(180deg,#4a2a10,#332010);border-radius:3px;box-shadow:0 3px 8px rgba(0,0,0,.8)}
#tm-shuri{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:50;pointer-events:none;filter:drop-shadow(0 0 8px rgba(180,200,220,.5))}
#tm-shuri.fly{display:block;animation:tmfly .55s cubic-bezier(.1,.5,.25,1) forwards}
@keyframes tmfly{
  0%{transform:translate(calc(-50% - 550px),-50%) rotate(0deg);opacity:1}
  82%{transform:translate(-50%,-50%) rotate(1080deg);opacity:1}
  100%{transform:translate(-50%,-50%) rotate(1080deg);opacity:0}
}
#tm-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:200;transition:opacity .07s}
#tm-flash.on{opacity:1}
.tmpt{position:absolute;border-radius:50%;pointer-events:none;z-index:150;transition:transform .65s cubic-bezier(.2,.8,.3,1),opacity .5s ease-out}
#tm-fortune{
  position:absolute;inset:0;background:rgba(7,7,16,.96);
  display:none;align-items:center;justify-content:center;z-index:180;
}
#tm-fortune.show{display:flex;animation:fin .3s ease-out}
@keyframes fin{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
#tm-f-inner{padding:1.3rem;text-align:center}
.tmfi{font-size:1.8rem;display:block;margin-bottom:.45rem;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#tm-f-text{font-family:'Noto Serif KR',serif;font-size:.78rem;line-height:1.9;color:var(--text);margin-bottom:1rem;word-break:keep-all}
#tm-f-text.loading{color:var(--text3);font-style:italic}
#tm-form{padding:.75rem .9rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.55rem}
.tm-who{font-size:.72rem;color:var(--text2);text-align:center;padding:.3rem;border-bottom:1px solid var(--border);margin-bottom:.2rem}
.tm-who b{color:var(--gold-l);font-family:'Black Han Sans',sans-serif}
#tm-myname{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.78rem;padding:.44rem .66rem;outline:none;transition:border-color .2s}
#tm-myname:focus{border-color:var(--purple)}
#tm-myname::placeholder{color:var(--text3);opacity:.55;font-size:.72rem}
#tm-msg{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.76rem;padding:.44rem .66rem;outline:none;transition:border-color .2s;resize:none;min-height:52px;line-height:1.6}
#tm-msg:focus{border-color:var(--red)}
#tm-msg::placeholder{color:var(--text3);opacity:.55;font-size:.7rem}
.tm-btns{display:flex;gap:.45rem}
#tm-throw-btn{
  flex:1;padding:.6rem;background:var(--red);color:#fff;border:none;border-radius:7px;
  font-family:'Black Han Sans',sans-serif;font-size:.85rem;letter-spacing:.08em;
  cursor:pointer;transition:background .15s,box-shadow .15s;
  box-shadow:0 3px 12px var(--rg);
}
#tm-throw-btn:hover{background:var(--red-h)}
#tm-throw-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
#tm-cancel{
  padding:.6rem .9rem;background:transparent;border:1px solid var(--border2);
  color:var(--text3);border-radius:7px;font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;cursor:pointer;transition:all .18s;
}
#tm-cancel:hover{border-color:var(--border3);color:var(--text2)}
#tm-close-btn{
  width:100%;padding:.52rem;background:transparent;border:1px solid var(--border2);
  color:var(--text2);border-radius:7px;font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;cursor:pointer;margin-top:.5rem;transition:all .18s;
}
#tm-close-btn:hover{background:var(--bg3)}

/* skel */
.skel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.85rem;animation:sp 1.6s ease infinite}
.sl{height:9px;border-radius:4px;background:var(--bg3);margin-bottom:.48rem}
@keyframes sp{0%,100%{opacity:.6}50%{opacity:1}}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;color:var(--text3);font-size:.76rem;text-align:center;padding:2rem}
.ei{font-size:2.4rem;opacity:.38}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .32s ease-in-out!important;border-color:var(--red)!important}

@media(max-width:640px){
  #body{flex-direction:column}
  #left{width:100%;border-right:none;border-bottom:1px solid var(--border);flex:0 0 auto;max-height:45vh;padding:.8rem}
  .hof-r{display:none}
}
</style>
</head>
<body>

<!-- ══ HOF ══ -->
<div id="hof">
  <div id="hof-title">🏯 저주 명예의 전당</div>
  <div class="hof-ranks" id="hof-ranks"><span class="hof-empty">불러오는 중...</span></div>
  <div class="hof-r">
    <div class="ldot"></div>
    <div class="sp">총 <b id="total-cnt">—</b>발 던짐</div>
    <div class="sp">인형 <b id="doll-cnt">—</b>개</div>
  </div>
</div>

<!-- ══ HEADER ══ -->
<div id="hdr">
  <div style="display:flex;align-items:center;gap:.45rem">
    <h1>⚔️ 저주인형 전당</h1>
    <span class="h-sub">CURSE DOLL COMMUNITY</span>
  </div>
  <div class="h-right">내 저주인형을 올리고 친구들과 함께 던져요 · 30초 갱신</div>
</div>

<div id="body">

  <!-- ══ LEFT ══ -->
  <div id="left">
    <h2>🪆 내 저주인형 추가</h2>

    <div class="form-group">
      <label>내 이름 (닉네임)</label>
      <input id="f-creator" placeholder="예) 김예리, 민지언니..." maxlength="10">
    </div>
    <div class="form-group">
      <label>저주 대상 별명</label>
      <input id="f-nick" placeholder="예) 갸쉐끼, 그팀장, 진상고객..." maxlength="15">
    </div>
    <div class="form-group">
      <label>왜 저주해? <span style="color:var(--text3);font-size:.56rem">(선택)</span></label>
      <textarea id="f-reason" placeholder="이 인형을 올리는 이유를 써봐요&#10;친구들이 공감해줄거야!"></textarea>
    </div>

    <button id="add-btn" onclick="addDoll()">🪆 인형 올리기</button>
    <div id="add-err" style="font-size:.7rem;color:var(--red);min-height:1rem;text-align:center;line-height:1.5;word-break:break-all"></div>
    <div id="conn-status" style="font-size:.65rem;text-align:center;color:var(--text3)">연결 확인 중...</div>
    <p class="form-hint">인형을 올리면 친구들이<br>나도 던지기로 같이 저주해줄 수 있어요!</p>

    <div class="divider"></div>

    <div id="my-dolls-preview">
      <h3>내가 올린 인형</h3>
      <div id="my-doll-list"><span style="font-size:.7rem;color:var(--text3)">아직 없어요</span></div>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div id="right">
    <div id="feed-hdr">
      <div class="ft">
        <div class="ldot"></div>
        모두의 저주인형
        <span class="fcnt" id="feed-cnt-badge">0개</span>
      </div>
      <div class="fa">
        <button class="fb act" id="sort-new" onclick="setSort('new')">최신순</button>
        <button class="fb" id="sort-hot" onclick="setSort('hot')">많이맞은순</button>
        <button class="fb" onclick="loadFeed()">↺ 새로고침</button>
      </div>
    </div>
    <div id="feed">
      <div class="skel"><div class="sl" style="width:35%"></div><div class="sl" style="width:80%"></div><div class="sl" style="width:58%"></div></div>
      <div class="skel"><div class="sl" style="width:40%"></div><div class="sl" style="width:70%"></div><div class="sl" style="width:65%"></div></div>
    </div>
  </div>
</div>

<!-- ══ THROW MODAL ══ -->
<div id="throw-modal">
  <div id="tm-box">
    <div id="tm-arena">
      <div class="tm-ring" style="width:80px;height:80px;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
      <div class="tm-ring" style="width:160px;height:160px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.65"></div>
      <div class="tm-ring" style="width:240px;height:240px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.35"></div>

      <div id="tm-target">
        <div id="tm-nick-tag">
          <span class="tmnt" id="tm-nick-txt">???</span>
          <span class="tmsf">의 인형</span>
        </div>

<script>
/* ╔═══════════════════════════════════╗
   ║  🔑 여기만 채우면 됩니다!         ║
   ╚═══════════════════════════════════╝ */
const JSONBIN_KEY = '$2a$10$doy3ZXd3kyC6D.R37m4DKeNfV1PBou1R8tXDGKUHJCsn4ZLut2A/a';  // ← X-Master-Key 여기에
const JSONBIN_BIN = '6a168d7ef47d5c455c3bd8f1';  // ← BIN ID 여기에
/* ═══════════════════════════════════ */

const ICONS=['🌟','🔥','💥','⚡','🎯','🌈','💫','✨','🎊','🏆','😤','🙌','🦾','🎉','👊'];
const COLORS=['#c41825','#d4aa40','#c8a870','#8090a0','#a04050','#50a070','#7050a0'];
const MEDALS=['🥇','🥈','🥉'];
const RANK_CLS=['r1','r2','r3'];

// 아바타 색상 - 사람 이름별로 고정
const AV_COLORS=[
  ['#c41825','#ff9090'],['#8a6a10','#e8b840'],['#0f4a8a','#7ab0f0'],
  ['#4a108a','#b070e0'],['#0a6a3a','#50d090'],['#8a300a','#e07040'],
  ['#2a408a','#7090e0'],['#6a0a4a','#d060a0'],
];
const creatorColors={};
function getCreatorColor(name){
  if(!creatorColors[name]){
    const keys=Object.keys(creatorColors);
    creatorColors[name]=AV_COLORS[keys.length % AV_COLORS.length];
  }
  return creatorColors[name];
}

let apiKey=JSONBIN_KEY, binId=JSONBIN_BIN;
let myId=localStorage.getItem('dojo_uid')||genUID();
let sortMode='new', busy=false;
let allDolls=[];
let currentDollId=null;

function genUID(){
  const id='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  localStorage.setItem('dojo_uid',id);return id;
}

/* ── JSONBIN ── */
async function readBin(){
  if(!apiKey||!binId) return [];
  const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{
    headers:{'X-Master-Key':apiKey,'X-Bin-Meta':'false'}
  });
  if(!r.ok){
    const txt=await r.text();
    throw new Error(`읽기 실패 [${r.status}]: ${txt}`);
  }
  const data=await r.json();
  // 배열이 아닌 경우 (빈 객체 {} 등) 강제 초기화
  if(!Array.isArray(data)){
    console.warn('BIN 데이터가 배열이 아님, 초기화:', data);
    await writeBinRaw([]);
    return [];
  }
  return data;
}
async function writeBin(arr){
  if(!apiKey||!binId) return;
  const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body:JSON.stringify(arr)
  });
  if(!r.ok){
    const txt=await r.text();
    throw new Error(`쓰기 실패 [${r.status}]: ${txt}`);
  }
}
async function writeBinRaw(arr){
  if(!apiKey||!binId) return;
  await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
    body:JSON.stringify(arr)
  });
}
async function clearOldData(){
  if(!confirm('BIN 안의 모든 데이터를 초기화할게요.\n이전 버전 데이터가 사라져요. 계속할까요?')) return;
  try{
    await writeBin([]);
    allDolls=[];
    renderFeed();renderHOF();updateStats();updateMyPreview();
    alert('✅ 초기화 완료! 이제 새로 인형을 올려봐요.');
  }catch(e){alert('실패: '+e.message);}
}
async function testConn(){
  const btn=document.getElementById('test-btn');
  btn.textContent='확인 중...';btn.disabled=true;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{
      headers:{'X-Master-Key':apiKey,'X-Bin-Meta':'false'}
    });
    const txt=await r.text();
    if(r.ok){
      btn.textContent='✅ 연결 성공!';
      setTimeout(()=>{btn.textContent='🔌 연결 테스트';btn.disabled=false;},2500);
    } else {
      alert(`❌ 연결 실패 [${r.status}]\n\n${txt}\n\n→ API Key 또는 BIN ID를 확인하세요`);
      btn.textContent='🔌 연결 테스트';btn.disabled=false;
    }
  }catch(e){
    alert(`❌ 네트워크 오류\n${e.message}`);
    btn.textContent='🔌 연결 테스트';btn.disabled=false;
  }
}

/* ── LOAD ── */
async function loadFeed(){
  const cs=document.getElementById('conn-status');
  if(!apiKey||!binId){
    if(cs) cs.textContent='❌ KEY/BIN ID 미설정';
    document.getElementById('feed').innerHTML=`<div class="empty-state"><div class="ei">🔑</div><div>JSONBIN_KEY 와 JSONBIN_BIN 을<br>파일 상단에 입력해주세요</div></div>`;
    return;
  }
  try{
    allDolls=await readBin();
    if(cs) cs.innerHTML='✅ <span style="color:var(--green)">연결됨</span>';
    renderFeed();renderHOF();updateStats();updateMyPreview();
  }catch(e){
    console.error('loadFeed 에러:',e);
    if(cs) cs.textContent='❌ '+e.message;
  }
}

/* ── RENDER FEED ── */
function renderFeed(){
  const feed=document.getElementById('feed');
  // 새 포맷 (creator 있는 것)만 필터링
  const validDolls=allDolls.filter(d=>d.creator&&d.nickname);
  document.getElementById('feed-cnt-badge').textContent=validDolls.length+'개';
  if(!validDolls.length){
    feed.innerHTML=`<div class="empty-state"><div class="ei">🪆</div><div>아직 인형이 없어요<br>첫 번째로 저주인형을 올려봐요!</div></div>`;
    return;
  }

  // 사람별 그룹
  const groups={};
  const order=[];
  validDolls.forEach(d=>{
    if(!groups[d.creator]){groups[d.creator]=[];order.push(d.creator);}
    groups[d.creator].push(d);
  });

  // 정렬
  if(sortMode==='hot'){
    order.sort((a,b)=>{
      const sa=groups[a].reduce((s,d)=>s+totalThrows(d),0);
      const sb=groups[b].reduce((s,d)=>s+totalThrows(d),0);
      return sb-sa;
    });
  } else {
    order.sort((a,b)=>{
      const ta=Math.max(...groups[a].map(d=>new Date(d.timestamp)));
      const tb=Math.max(...groups[b].map(d=>new Date(d.timestamp)));
      return tb-ta;
    });
  }

  feed.innerHTML=order.map(creator=>creatorBlockHTML(creator,groups[creator])).join('');
}

function totalThrows(d){ return (d.throws||[]).length; }

function creatorBlockHTML(creator, dolls){
  const [bg,fg]=getCreatorColor(creator);
  const safeCreator=creator||'익명';
  const initials=safeCreator.slice(0,2);
  const sortedDolls=sortMode==='hot'
    ?[...dolls].sort((a,b)=>totalThrows(b)-totalThrows(a))
    :[...dolls].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const totalT=dolls.reduce((s,d)=>s+totalThrows(d),0);
  return `
  <div class="creator-block">
    <div class="cb-header">
      <div class="cb-avatar" style="background:${bg};color:${fg}">${initials}</div>
      <div>
        <div class="cb-name">${esc(safeCreator)}의 저주인형들</div>
        <div class="cb-sub">인형 ${dolls.length}개 · 총 ${totalT}발 맞음</div>
      </div>
    </div>
    <div class="cb-dolls">${sortedDolls.map(d=>dollCardHTML(d,creator)).join('')}</div>
  </div>`;
}

function dollCardHTML(d, creator){
  const throws=d.throws||[];
  const cnt=throws.length;
  const maxHits=Math.max(...allDolls.map(x=>(x.throws||[]).length),1);
  const pct=Math.round(cnt/maxHits*100);
  const isMine=d.uid===myId;
  const recentThrows=throws.slice(-3).reverse();
  const hasMore=throws.length>3;

  return `
  <div class="dc" data-id="${d.id}">
    <div class="dc-doll">
      <svg viewBox="0 0 200 275" width="48" height="65" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="55" rx="42" ry="44" fill="#c8a870" stroke="#8a6020" stroke-width="2"/>
        <line x1="79" y1="41" x2="90" y2="52" stroke="#4a2800" stroke-width="3" stroke-linecap="round"/>
        <line x1="90" y1="41" x2="79" y2="52" stroke="#4a2800" stroke-width="3" stroke-linecap="round"/>
        <line x1="110" y1="41" x2="121" y2="52" stroke="#4a2800" stroke-width="3" stroke-linecap="round"/>
        <line x1="121" y1="41" x2="110" y2="52" stroke="#4a2800" stroke-width="3" stroke-linecap="round"/>
        <path d="M84 70 Q100 80 116 70" fill="none" stroke="#4a2800" stroke-width="2" stroke-dasharray="4,3" stroke-linecap="round"/>
        <rect x="58" y="105" width="84" height="90" rx="13" fill="#c8a870" stroke="#8a6020" stroke-width="2"/>
        <circle cx="100" cy="150" r="24" fill="none" stroke="#c41825" stroke-width="1.6" opacity=".85"/>
        <circle cx="100" cy="150" r="9" fill="none" stroke="#c41825" stroke-width="1.2" opacity=".65"/>
        <circle cx="100" cy="150" r="3" fill="#c41825" opacity=".8"/>
        <rect x="28" y="108" width="30" height="46" rx="9" fill="#c8a870" stroke="#8a6020" stroke-width="1.5"/>
        <rect x="142" y="108" width="30" height="46" rx="9" fill="#c8a870" stroke="#8a6020" stroke-width="1.5"/>
        <rect x="60" y="196" width="36" height="55" rx="10" fill="#c8a870" stroke="#8a6020" stroke-width="1.5"/>
        <rect x="104" y="196" width="36" height="55" rx="10" fill="#c8a870" stroke="#8a6020" stroke-width="1.5"/>
      </svg>
      <div class="dc-hit-bar"><div class="dc-hit-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="dc-body">
      <div class="dc-top">
        <span class="dc-nick">「${esc(d.nickname)}」</span>
        <span class="dc-sf">인형</span>
        ${isMine?`<span style="font-size:.56rem;color:var(--red);background:rgba(196,24,37,.1);border:1px solid rgba(196,24,37,.22);border-radius:3px;padding:.05rem .3rem">내 인형</span>`:''}
        <span class="dc-cnt">⚡ ${cnt}발</span>
      </div>
      ${d.reason?`<div class="dc-reason">${esc(d.reason)}</div>`:''}
      ${recentThrows.length?`
      <div class="dc-throws">
        ${hasMore?`<div class="throw-more" onclick="toggleThrows(this,${d.id})">▼ 던진 사람 ${cnt}명 보기</div>`:''}
        <div class="throw-list" style="${hasMore?'display:none':''}">
          ${throws.slice().reverse().map(t=>`
          <div class="throw-item">
            <span class="throw-icon">${t.icon||'🌟'}</span>
            <div>
              ${t.thrower?`<span style="font-size:.62rem;color:var(--purple);font-weight:500">${esc(t.thrower)}</span> `:''}
              <span class="throw-fortune">${esc(t.fortune)}</span>
            </div>
            <span class="throw-time">${relTime(t.timestamp)}</span>
          </div>`).join('')}
        </div>
      </div>`:''}
      <button class="dc-throw-btn" onclick="openModal(${d.id})">⚡ 나도 던지기!</button>
    </div>
  </div>`;
}

function toggleThrows(el, dollId){
  const list=el.nextElementSibling;
  const open=list.style.display!=='none';
  list.style.display=open?'none':'flex';
  list.style.flexDirection='column';
  list.style.gap='.28rem';
  el.textContent=open?`▼ 던진 사람 보기`:`▲ 접기`;
}

/* ── HOF ── */
function renderHOF(){
  const hofEl=document.getElementById('hof-ranks');
  const validDolls=allDolls.filter(d=>d.creator&&d.nickname);
  if(!validDolls.length){hofEl.innerHTML=`<span class="hof-empty">아직 없어요</span>`;return;}
  const ranked=[...validDolls].sort((a,b)=>totalThrows(b)-totalThrows(a)).slice(0,3);
  hofEl.innerHTML=ranked.map((d,i)=>`
    <div class="hr ${RANK_CLS[i]}">
      <span class="rm">${MEDALS[i]}</span>
      <div class="rinfo">
        <span class="rn">「${esc(d.nickname)}」</span>
        <span class="rc">${esc(d.creator)} · ${totalThrows(d)}발 맞음</span>
      </div>
    </div>`).join('');
}

function updateStats(){
  const totalT=allDolls.reduce((s,d)=>s+totalThrows(d),0);
  document.getElementById('total-cnt').textContent=totalT;
  document.getElementById('doll-cnt').textContent=allDolls.length;
}

function updateMyPreview(){
  const myDolls=allDolls.filter(d=>d.uid===myId);
  const el=document.getElementById('my-doll-list');
  if(!myDolls.length){el.innerHTML=`<span style="font-size:.7rem;color:var(--text3)">아직 없어요</span>`;return;}
  el.innerHTML=myDolls.map(d=>`
    <div class="my-doll-chip">
      <span class="mdc-nick">「${esc(d.nickname)}」</span>
      <span class="mdc-cnt">⚡ ${totalThrows(d)}발</span>
    </div>`).join('');
}

/* ── ADD DOLL ── */
async function addDoll(){
  const btn=document.getElementById('add-btn');
  const errEl=document.getElementById('add-err');
  errEl.textContent='';

  if(!apiKey||!binId){
    errEl.textContent='⚠️ JSONBIN_KEY / BIN ID가 비어있어요';
    return;
  }
  const creator=document.getElementById('f-creator').value.trim();
  const nick=document.getElementById('f-nick').value.trim();
  const reason=document.getElementById('f-reason').value.trim();
  if(!creator){shake('f-creator');return;}
  if(!nick){shake('f-nick');return;}

  btn.disabled=true; btn.textContent='올리는 중...';
  try{
    const current=await readBin();
    const rec={
      id:Date.now(),uid:myId,creator,nickname:nick,reason,
      throws:[],timestamp:new Date().toISOString()
    };
    current.push(rec);
    await writeBin(current);
    allDolls=current;
    document.getElementById('f-nick').value='';
    document.getElementById('f-reason').value='';
    errEl.textContent='';
    renderFeed();renderHOF();updateStats();updateMyPreview();
  }catch(e){
    console.error('addDoll 에러:', e);
    errEl.textContent='❌ '+e.message;
  }finally{
    btn.disabled=false;
    btn.textContent='🪆 인형 올리기';
  }
}

/* ── THROW MODAL ── */
function openModal(dollId){
  const doll=allDolls.find(d=>d.id===dollId);
  if(!doll) return;
  currentDollId=dollId;
  document.getElementById('tm-nick-txt').textContent=doll.nickname;
  document.getElementById('tm-nick-txt2').textContent=doll.nickname;
  document.getElementById('tm-creator-txt').textContent=doll.creator;
  document.getElementById('tm-fortune').classList.remove('show');
  resetTmDoll();
  document.getElementById('throw-modal').classList.add('show');
}
function closeModal(){
  document.getElementById('throw-modal').classList.remove('show');
  document.getElementById('tm-fortune').classList.remove('show');
  document.getElementById('tm-throw-btn').disabled=false;
  resetTmDoll();
  currentDollId=null;
  busy=false;
}

async function doThrow(){
  if(busy||currentDollId===null) return;
  const myname=document.getElementById('tm-myname').value.trim();
  const msg=document.getElementById('tm-msg').value.trim();
  busy=true;
  document.getElementById('tm-throw-btn').disabled=true;

  const doll=allDolls.find(d=>d.id===currentDollId);
  const fortuneProm=genFortune(doll?.nickname||'???',msg);

  // 표창 날리기
  const shuri=document.getElementById('tm-shuri');
  shuri.classList.add('fly');
  await new Promise(r=>shuri.addEventListener('animationend',r,{once:true}));
  playHit();
  const fl=document.getElementById('tm-flash');
  fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),90);
  shuri.classList.remove('fly');
  explodeTmDoll();spawnTmParticles();

  document.getElementById('tm-f-text').textContent='✨ 격려문구 생성 중...';
  document.getElementById('tm-f-text').className='loading';
  document.getElementById('tm-f-icon').textContent='⏳';
  document.getElementById('tm-fortune').classList.add('show');

  const fortune=await fortuneProm;
  const icon=ICONS[Math.floor(Math.random()*ICONS.length)];
  document.getElementById('tm-f-text').textContent=fortune;
  document.getElementById('tm-f-text').className='';
  document.getElementById('tm-f-icon').textContent=icon;

  // 저장
  try{
    const current=await readBin();
    const target=current.find(d=>d.id===currentDollId);
    if(target){
      if(!target.throws) target.throws=[];
      target.throws.push({
        uid:myId,thrower:myname||null,fortune,icon,
        message:msg||null,timestamp:new Date().toISOString()
      });
      await writeBin(current);
      allDolls=current;
      renderFeed();renderHOF();updateStats();updateMyPreview();
    }
  }catch(e){console.error(e);}
}

function explodeTmDoll(){
  [{id:'tm-head',x:-12,y:-110,r:200},{id:'tm-body',x:18,y:55,r:15},
   {id:'tm-la',x:-130,y:-18,r:-115},{id:'tm-ra',x:130,y:-14,r:115},
   {id:'tm-ll',x:-68,y:120,r:-58},{id:'tm-rl',x:68,y:120,r:58}
  ].forEach(({id,x,y,r})=>{
    const el=document.getElementById(id);
    if(el){el.style.transform=`translate(${x}px,${y}px) rotate(${r}deg)`;el.style.opacity='0';}
  });
}
function resetTmDoll(){
  document.querySelectorAll('.tmdp').forEach(el=>{
    el.style.transition='none';el.style.transform='';el.style.opacity='1';
    setTimeout(()=>el.style.transition='',60);
  });
}
function spawnTmParticles(){
  const arena=document.getElementById('tm-arena');
  const aw=arena.offsetWidth,ah=arena.offsetHeight;
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='tmpt';
    const sz=3+Math.random()*7;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};top:${ah/2}px;left:${aw/2}px;position:absolute;border-radius:50%;pointer-events:none;z-index:150;transition:transform .65s cubic-bezier(.2,.8,.3,1),opacity .5s ease-out`;
    arena.appendChild(p);
    const angle=Math.random()*Math.PI*2,dist=45+Math.random()*130;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
      p.style.opacity='0';
    }));
    setTimeout(()=>p.remove(),750);
  }
}

      body:JSON.stringify({

표창이 인형에 꽂혔어! 이제 이 사람에게 유쾌한 격려 메시지를 써줘:

}

/* ── UTILS ── */
function playHit(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(30,t+.2);
    g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.32);
    o.start(t);o.stop(t+.32);
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.12),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    const src=ctx.createBufferSource();src.buffer=buf;
    const ng=ctx.createGain();src.connect(ng);ng.connect(ctx.destination);
    ng.gain.setValueAtTime(.4,t);src.start(t);src.stop(t+.12);
  }catch(e){}
}
function shake(id){
  const el=document.getElementById(id);
  el.classList.add('shake');
  el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});
  el.focus();
}
function relTime(ts){
  const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000);
  if(m<1)return'방금';if(m<60)return m+'분 전';
  const h=Math.floor(m/60);if(h<24)return h+'시간 전';
  return Math.floor(h/24)+'일 전';
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
